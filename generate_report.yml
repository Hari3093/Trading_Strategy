name: 📊 Generate Trading Report

on:
  push:
    paths:
      - 'data/trades.csv'   # Triggers when you update trades
  schedule:
    - cron: '0 18 * * 1-5'  # Auto-run Mon-Fri at 6PM IST (12:30 UTC)
  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Generate Excel report
        run: python scripts/generate_report.py

      - name: Upload report as artifact
        uses: actions/upload-artifact@v3
        with:
          name: trading-report-${{ github.run_number }}
          path: trading_report.xlsx
          retention-days: 30

      - name: Commit report to repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add trading_report.xlsx
          git diff --staged --quiet || git commit -m "📊 Auto-update trading report [$(date +'%Y-%m-%d')]"
          git push
